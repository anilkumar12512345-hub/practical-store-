<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical Store</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f8;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #0b252b, #133b44);
            color: white;
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }
        .store-logo {
            max-width: 140px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            background: white;
            padding: 5px;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .tabs button {
            padding: 10px 20px;
            border: none;
            background: #ddd;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }
        .tabs button.active {
            background: #133b44;
            color: white;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #eee;
        }
        .product-info {
            padding: 15px;
        }
        .product-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .product-price {
            color: #27ae60;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #133b44;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- ఇక్కడ మీ లోగో ఫోటో పేరు logo.jpg అని పెట్టబడింది -->
            <img src="logo.jpg" alt="Practical Store Logo" class="store-logo" id="storeLogoImg">
        </div>
        <h1>Practical Store</h1>
    </header>

    <div class="container">
        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="active" onclick="switchTab('shop')">Shop (షాప్)</button>
            <button onclick="switchTab('orders')">Orders Inbox (ఆర్డర్లు)</button>
            <button onclick="switchTab('add-product')">Add Product (కొత్త ప్రొడక్ట్)</button>
        </div>

        <!-- Shop Section -->
        <div id="shop" class="section active">
            <div class="products-grid" id="productsContainer">
                <p style="text-align:center; color:#666; grid-column: 1/-1;">No products added yet. Click on 'Add Product' to add items!</p>
            </div>
        </div>

        <!-- Orders Section -->
        <div id="orders" class="section">
            <h2>Orders Received</h2>
            <p>No orders yet.</p>
        </div>

        <!-- Add Product Section -->
        <div id="add-product" class="section">
            <h2>Add New Product</h2>
            <div class="form-group">
                <label>Product Title</label>
                <input type="text" id="prodTitle" placeholder="Enter product name">
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="prodPrice" placeholder="Enter price">
            </div>
            <div class="form-group">
                <label>Product Image</label>
                <input type="file" id="prodImgFile" accept="image/*">
            </div>
            <button class="btn" onclick="addNewProduct()">Publish Product</button>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        let products = JSON.parse(localStorage.getItem('storeProducts')) || [];

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            if (products.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#666; grid-column: 1/-1;">No products added yet.</p>';
                return;
            }
            container.innerHTML = products.map((p, index) => `
                <div class="product-card">
                    <img src="${p.img}" class="product-img" alt="${p.title}">
                    <div class="product-info">
                        <div class="product-title">${p.title}</div>
                        <div class="product-price">₹${p.price}</div>
                        <button class="btn" onclick="buyProduct('${p.title}')">Buy Now</button>
                    </div>
                </div>
            `).join('');
        }

        function addNewProduct() {
            const title = document.getElementById('prodTitle').value;
            const price = document.getElementById('prodPrice').value;
            const fileInput = document.getElementById('prodImgFile');

            if (!title || !price || fileInput.files.length === 0) {
                alert('Please fill all fields and select an image!');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                products.push({ title, price, img: e.target.result });
                localStorage.setItem('storeProducts', JSON.stringify(products));
                renderProducts();
                alert('Product added successfully!');
                switchTab('shop');
                document.getElementById('prodTitle').value = '';
                document.getElementById('prodPrice').value = '';
                fileInput.value = '';
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function buyProduct(title) {
            alert('Order placed for: ' + title);
        }

        renderProducts();
    </script>
</body>
</html>
